name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '28.1'
          - '29.1'
          - '30.1'
          - 'snapshot'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Emacs ${{ matrix.emacs_version }}
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Run tests
        run: |
          # When tests exist, run them here
          # emacs --batch -L . -l test/package-audit-test.el -f ert-run-tests-batch-and-exit
          echo "No tests yet - this workflow is a placeholder"
