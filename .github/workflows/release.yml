name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify version in package file
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if ! grep -q "^;; Version: $VERSION$" package-audit.el; then
            echo "Version mismatch: tag is v$VERSION but package-audit.el has:"
            grep "^;; Version:" package-audit.el
            exit 1
          fi

      - name: Extract changelog for this version
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Extract section between [VERSION] and next [VERSION] or EOF
          NOTES=$(awk "/## \[$VERSION\]/,/## \[/ {if (/## \[/ && !/$VERSION/) exit; if (!/## \[$VERSION\]/) print}" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
